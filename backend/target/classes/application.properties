# SheEarn Application Configuration
spring.application.name=shearn-backend

# MongoDB Configuration
spring.data.mongodb.uri=mongodb://localhost:27017/shearn_db
spring.data.mongodb.database=shearn_db

# JWT Configuration
app.jwt.secret=SheEarnSecretKey2024VeryLongSecretKeyForHMACSHA256Algorithm
app.jwt.expiration=86400000

# Server Configuration
server.port=8080

# CORS (allow frontend origin)
app.cors.allowed-origins=http://localhost:3000

# Logging
logging.level.com.shearn=DEBUG
logging.level.org.springframework.security=WARN

# File Upload (for skill images)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
